name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web-admin
        run: pnpm --filter @squarely/web-admin exec tsc --noEmit

      - name: Typecheck mobile
        run: pnpm --filter @squarely/mobile exec tsc --noEmit

      - name: Unit tests
        run: pnpm test
